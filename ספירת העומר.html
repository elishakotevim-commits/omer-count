<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ספירת העומר - אפליקציה מלאה</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&family=Alef:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f0f4f8; }
        .hebrew-font { font-family: 'Alef', serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-md w-full glass rounded-3xl shadow-2xl overflow-hidden border border-white">
        <div class="bg-indigo-800 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">ספירת העומר</h1>
            <p id="hebrew-date" class="opacity-80 mt-1">טוען תאריך...</p>
        </div>

        <div class="p-8 text-center">
            <div class="text-6xl font-black text-indigo-900 mb-2" id="day-display">--</div>
            <div class="text-xl text-gray-600 mb-8">ימים לעומר</div>

            <div class="bg-indigo-50 p-6 rounded-2xl mb-6">
                <p class="text-sm text-indigo-700 mb-2 font-bold">נוסח הספירה הערב:</p>
                <p id="omer-string" class="hebrew-font text-2xl text-gray-800 leading-tight"></p>
            </div>

            <button id="notify-btn" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg hover:bg-indigo-700 transition-all flex items-center justify-center gap-2">
                <span>🔔 הפעל תזכורת יומית</span>
            </button>
            <p id="status" class="text-xs text-gray-400 mt-3"></p>
        </div>
    </div>

    <script>
        // לוגיקת חישוב
        async function init() {
            const now = new Date();
            const isAfterSunset = now.getHours() >= 19; // שקיעה משוערת
            
            try {
                const response = await fetch(`https://www.hebcal.com/converter?cfg=json&date=${now.toISOString().split('T')[0]}&g2h=1&gs=${isAfterSunset ? '1' : '0'}`);
                const data = await response.json();
                document.getElementById('hebrew-date').innerText = data.hebrew;
                
                const omerDay = data.events?.find(e => e.includes("Omer"))?.match(/\d+/)?.[0] || "1";
                document.getElementById('day-display').innerText = omerDay;
                generateOmerText(parseInt(omerDay));
            } catch (e) {
                document.getElementById('hebrew-date').innerText = "שגיאה בטעינה";
            }
        }

        function generateOmerText(day) {
            let text = `היום ${day} ימים לעומר`;
            if (day >= 7) {
                const weeks = Math.floor(day / 7);
                const days = day % 7;
                text += `, שהם ${weeks} שבועות`;
                if (days > 0) text += ` ו-${days} ימים`;
            }
            document.getElementById('omer-string').innerText = text;
        }

        // --- Notification Logic ---
        // Removed Blob-based Service Worker as it causes protocol errors in many environments.
        // Instead, we use standard browser Notifications for the web interface.
        
        async function scheduleReminder() {
            if (!("Notification" in window)) {
                document.getElementById('status').innerText = "הדפדפן אינו תומך בהתראות.";
                return;
            }

            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                document.getElementById('status').innerText = "התזכורת הופעלה! תקבל התראה מדי ערב ב-20:30.";
                
                // For a true offline/closed experience, a physical .js file is required for ServiceWorker.
                // In this single-file preview, we use an interval-based local notification.
                setInterval(() => {
                    const now = new Date();
                    if (now.getHours() === 20 && now.getMinutes() === 30) {
                        new Notification("ספירת העומר", { 
                            body: "זמן ספירת העומר! אל תשכחו לספור בברכה.",
                            icon: 'https://cdn-icons-png.flaticon.com/512/2693/2693507.png'
                        });
                    }
                }, 60000);

                // Initial confirmation
                new Notification("ספירת העומר", { body: "התזכורות הוגדרו בהצלחה" });
            } else {
                document.getElementById('status').innerText = "יש לאשר התראות בהגדרות הדפדפן.";
            }
        }

        document.getElementById('notify-btn').onclick = scheduleReminder;

        init();
    </script>
</body>
</html>
